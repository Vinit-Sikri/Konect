<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to Konect — real-time messaging.">
  <title>Sign In — Konect</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <form class="container" id="login-form" autocomplete="off" novalidate>
    <div class="brand-header">
      <div class="brand-logo">K</div>
      <span class="brand-title">Konect</span>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to continue your conversations</p>

    <div class="input-group">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="input-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
    </div>

    <button class="btn-login" id="login-btn" type="submit">
      <span class="btn-text">Sign In</span>
    </button>

    <div class="login-link">
      <p>Don't have an account? <a href="registration.html">Create one</a></p>
    </div>

    <div class="error-text" id="error-box"></div>
  </form>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="js/authLogin.js"></script>
</body>
</html>
